# API routes for MinIO.
# When MinIO is behind nginx-microservice, we MUST register only the
# prefixed S3 paths here (`/minio/` and `/records/`), not `/`.
# Using `/` would cause nginx-microservice to rewrite the URI and break S3.
/minio/   # S3 API under /minio/ (portal endpoint_url uses this prefix)
/records/ # Optional alias for direct records paths (kept for compatibility)
