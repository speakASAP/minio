# MinIO reverse proxy (dev server).
# Include this inside a server {} block that has SSL and server_name for dev.
# MinIO API is at 127.0.0.1:9000; do not expose MinIO directly to the internet.
# Portal uses base URL (no /minio path), so S3 requests are PUT/GET /records/... at root.
# Both location / and /minio/ proxy to MinIO so base-URL and path-based clients work.

location / {
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 100M;
}

location /minio/ {
    proxy_pass http://127.0.0.1:9000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 100M;
}

location = /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
}
