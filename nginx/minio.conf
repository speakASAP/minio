# MinIO reverse proxy (alfares server).
# Include this inside a server {} block that has SSL and server_name for alfares.
# MinIO API is at 127.0.0.1:9000; do not expose MinIO directly to the internet.
# S3 SigV4 signs the Host header; proxy must forward the same Host the client used ($host).
# Forward Authorization so MinIO receives the SigV4 header unchanged.
# Both location / and /minio/ and /records/ proxy to MinIO.
# For prod: deploy.sh generates minio-proxy-settings.conf from this file and patches the
# generated minio.alfares.cz configs to use it (single source of truth for SigV4 headers).

location / {
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 100M;
}

location /minio/ {
    proxy_pass http://127.0.0.1:9000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 100M;
}

location /records/ {
    proxy_pass http://127.0.0.1:9000/records/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 100M;
}

location = /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
}
