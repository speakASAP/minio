services:
  minio:
    image: minio/minio:latest
    container_name: minio-microservice-blue
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_SERVER_URL=${MINIO_SERVER_URL}
      - MINIO_BROWSER_REDIRECT_URL=${MINIO_BROWSER_REDIRECT_URL}
      - LOGGING_SERVICE_URL=${LOGGING_SERVICE_URL}
    volumes:
      - /srv/minio-data:/data
    networks:
      - nginx-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      # Docker healthcheck is kept minimal; real HTTP health gating is done
      # by nginx-microservice using /minio/health/live from the registry.
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 1
      start_period: 5s

networks:
  nginx-network:
    external: true
    name: nginx-network
