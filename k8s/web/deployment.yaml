apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-web
  namespace: statex-apps
  labels:
    app: minio-web
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio-web
  template:
    metadata:
      labels:
        app: minio-web
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "96Mi"
              cpu: "100m"
          volumeMounts:
            - name: web-root
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: web-nginx
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: web-root
          configMap:
            name: minio-web-static
            items:
              - key: index.html
                path: index.html
              - key: client.html
                path: client/index.html
              - key: admin.html
                path: admin/index.html
              - key: styles.css
                path: styles.css
              - key: app.js
                path: app.js
        - name: web-nginx
          configMap:
            name: minio-web-static
            items:
              - key: default.conf
                path: default.conf
