apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-web-static
  namespace: statex-apps
  labels:
    app: minio-web
    managed-by: k8s-migration
data:
  index.html: |-
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Alfares Object Storage</title>
      <meta name="description" content="Private S3-compatible object storage for Alfares ecosystem applications and customer workloads." />
      <link rel="icon" href="data:," />
      <link rel="stylesheet" href="/styles.css?v=20260613-auth-body-validate" />
    </head>
    <body data-page="landing">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Alfares Object Storage home"><span class="brand-mark">A</span><span>Alfares Object Storage</span></a>
        <nav class="nav" aria-label="Primary navigation"><a href="/#pricing">Pricing</a><a href="/#register">Register</a><a href="/client/">Client</a><a href="/admin/">Admin</a></nav>
        <button class="icon-button menu-button" type="button" aria-label="Open navigation" data-menu-toggle>☰</button>
      </header>
      <main>
        <section id="landing" class="hero section-grid">
          <div class="hero-copy">
            <h1>Private S3 storage for applications that cannot leak data.</h1>
            <p>Managed MinIO-backed object storage with private buckets, presigned access boundaries, operational diagnostics, and onboarding paths for every application in the Alfares ecosystem.</p>
            <div class="hero-actions"><a class="button primary" href="#register">Start with a storage consultation</a><a class="button secondary" href="#pricing">View pricing</a></div>
            <dl class="proof-strip" aria-label="Service guarantees"><div><dt>Access model</dt><dd>Private buckets</dd></div><div><dt>Protocol</dt><dd>S3 compatible</dd></div><div><dt>Delivery</dt><dd>Presigned URLs</dd></div></dl>
          </div>
          <div class="product-preview" aria-label="Storage operations preview">
            <div class="preview-head"><span>Storage operations</span><strong>Healthy</strong></div>
            <div class="metric-grid"><div><span>Objects</span><strong>184,920</strong></div><div><span>Used</span><strong>4.8 TB</strong></div><div><span>Uptime</span><strong>99.98%</strong></div><div><span>Consumers</span><strong>12</strong></div></div>
            <div class="flow-list"><div><b>speakasap-portal</b><span>PUT /speakasap-records/YYYY/MM/DD</span></div><div><b>customer-app-7</b><span>GET presigned object, TTL 1h</span></div><div><b>diagnostics</b><span>SigV4 headers preserved</span></div></div>
          </div>
        </section>
        <section class="section band" id="pricing">
          <div class="section-title"><h2>Pricing that starts with the right storage boundary.</h2><p>Every plan includes private buckets, S3 endpoint access, CORS review, diagnostics, and administrator visibility.</p></div>
          <div class="pricing-grid"><article class="price-card"><h3>Launch</h3><p>For one application moving from local files to object storage.</p><strong>Consultation first</strong><ul><li>1 application profile</li><li>Private bucket mapping</li><li>Presigned URL setup review</li></ul><a class="button secondary" href="#register">Request Launch</a></article><article class="price-card featured"><h3>Platform</h3><p>For product teams with several services consuming shared storage.</p><strong>Usage based</strong><ul><li>Multiple application profiles</li><li>Usage and health dashboards</li><li>Operational alert review</li></ul><a class="button primary" href="#register">Request Platform</a></article><article class="price-card"><h3>Dedicated</h3><p>For strict isolation, custom retention, and high-volume workloads.</p><strong>Custom</strong><ul><li>Dedicated policy review</li><li>Custom CORS and TTL rules</li><li>Runbook and audit support</li></ul><a class="button secondary" href="#register">Talk to us</a></article></div>
        </section>
        <section class="section split" id="register">
          <div><h2>Register interest through Leads, then create your customer account.</h2><p>The intake flow records the commercial request first. After the lead is accepted, the account is created through the central Auth service so MinIO never collects passwords locally.</p></div>
          <form class="panel form-panel" data-lead-form><label>Name<input name="name" autocomplete="name" required /></label><label>Work email<input name="email" type="email" autocomplete="email" required /></label><label>Company<input name="company" autocomplete="organization" /></label><label>Storage need<textarea name="message" rows="4" required>We want to connect an application to Alfares Object Storage.</textarea></label><label class="check"><input name="marketingConsent" type="checkbox" /> I agree to receive follow-up about this storage request.</label><div class="form-actions"><button class="button primary" type="submit">Submit lead request</button><button class="button secondary" type="button" data-auth-register data-auth-target="/client/">Create Auth account</button></div><p class="form-status" role="status" data-lead-status></p></form>
        </section>
      </main>
      <script src="/app.js?v=20260613-auth-body-validate" defer></script>
    </body>
    </html>
  client.html: |-
    <!doctype html>
    <html lang="en">
    <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Client Dashboard | Alfares Object Storage</title><link rel="icon" href="data:," /><link rel="stylesheet" href="/styles.css?v=20260613-auth-body-validate" /></head>
    <body data-page="client">
    <header class="topbar"><a class="brand" href="/"><span class="brand-mark">A</span><span>Alfares Object Storage</span></a><nav class="nav"><a href="/">Landing</a><a href="/client/">Client</a><a href="/admin/">Admin</a></nav><button class="icon-button menu-button" type="button" aria-label="Open navigation" data-menu-toggle>☰</button></header>
    <main><section class="app-shell standalone" data-surface="client"><aside class="sidebar"><b>Client dashboard</b><a href="/client/" class="active">Overview</a><a href="#applications">Applications</a><a href="#connection">Connection</a><a href="#billing">Usage</a></aside><div class="workspace"><div class="workspace-head"><div><h1>Customer storage account</h1><p data-client-identity>Sign in through Auth to manage your applications.</p></div><div class="head-actions"><button class="button secondary" data-auth-login data-auth-target="/client/">Sign in</button><button class="button primary" data-auth-register data-auth-target="/client/">Create account</button></div></div><div class="dashboard-grid"><section class="panel"><h3>Account status</h3><div class="status-row"><span>Lead intake</span><b data-lead-state>Ready</b></div><div class="status-row"><span>Auth session</span><b data-auth-state>Not signed in</b></div><div class="status-row"><span>Storage access</span><b>Pending provisioning</b></div></section><section class="panel"><h3>Usage estimate</h3><div class="big-number">0.0 GB</div><p>Mock usage is shown until a protected backend connects real account data.</p></section><section class="panel wide" id="applications"><h3>Applications</h3><div class="table-wrap"><table><thead><tr><th>Name</th><th>Environment</th><th>Origins</th><th>Status</th></tr></thead><tbody data-app-table></tbody></table></div></section><section class="panel" id="connection"><h3>Add application</h3><form data-app-form class="compact-form"><input name="appName" placeholder="Application name" required /><select name="environment"><option>production</option><option>staging</option><option>development</option></select><input name="origin" placeholder="https://app.example.com" required /><button class="button primary" type="submit">Add application</button></form></section><section class="panel"><h3>Connection parameters</h3><code>Endpoint: https://minio.alfares.cz</code><code>Protocol: S3 path-style</code><code>Bucket: assigned after approval</code><code>Credentials: issued by operator</code></section><section class="panel" id="billing"><h3>Mock billing state</h3><div class="status-row"><span>Plan</span><b>Platform draft</b></div><div class="status-row"><span>Next review</span><b>After provisioning</b></div></section></div></div></section></main><script src="/app.js?v=20260613-auth-body-validate" defer></script></body></html>
  admin.html: |-
    <!doctype html>
    <html lang="en">
    <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Admin Panel | Alfares Object Storage</title><link rel="icon" href="data:," /><link rel="stylesheet" href="/styles.css?v=20260613-auth-body-validate" /></head>
    <body data-page="admin">
    <header class="topbar"><a class="brand" href="/"><span class="brand-mark">A</span><span>Alfares Object Storage</span></a><nav class="nav"><a href="/">Landing</a><a href="/client/">Client</a><a href="/admin/">Admin</a></nav><button class="icon-button menu-button" type="button" aria-label="Open navigation" data-menu-toggle>☰</button></header>
    <main><section class="app-shell admin-shell standalone" data-surface="admin"><aside class="sidebar admin-nav"><b>Admin panel</b><a href="/admin/" class="active">Health</a><a href="#admin-services">Services</a><a href="#admin-objects">Objects</a><a href="#admin-settings">Settings</a><a href="#admin-audit">Audit</a></aside><div class="workspace"><div class="workspace-head"><div><h1>MinIO operations console</h1><p data-admin-identity>Administrator role required: app:minio-microservice:admin or global:superadmin.</p></div><div class="head-actions"><button class="button secondary" data-auth-login data-auth-target="/admin/">Admin sign in</button><button class="button primary" data-admin-refresh>Refresh checks</button></div></div><div class="admin-lock" data-admin-lock>Admin data is hidden until an Auth token with a MinIO administrator role is validated.</div><div class="dashboard-grid admin-data" data-admin-data hidden><section class="panel"><h3>Health checks</h3><div class="status-row"><span>MinIO live</span><b data-health-live>Checking</b></div><div class="status-row"><span>MinIO ready</span><b data-health-ready>Checking</b></div><div class="status-row"><span>Admin API</span><b data-admin-api-status>Waiting</b></div></section><section class="panel"><h3>Storage summary</h3><div class="big-number" data-admin-total-bytes>Loading</div><div class="status-row"><span>Objects</span><b data-admin-object-count>Loading</b></div><div class="status-row"><span>Newest</span><b data-admin-newest>Loading</b></div></section><section class="panel"><h3>Security</h3><div class="status-row"><span>Anonymous read</span><b>Forbidden</b></div><div class="status-row"><span>Credentials in UI</span><b>Not exposed</b></div><div class="status-row"><span>Admin wrapper</span><b>Read only</b></div></section><section class="panel wide" id="admin-services"><h3>Consuming services</h3><div class="table-wrap"><table><thead><tr><th>Service</th><th>Bucket scope</th><th>Access mode</th><th>Last check</th></tr></thead><tbody><tr><td>speakasap-portal</td><td data-admin-bucket>speakasap-records</td><td>PUT + presigned GET</td><td>operational</td></tr><tr><td>customer applications</td><td>assigned per tenant</td><td>pending provisioning</td><td>requires write workflow</td></tr><tr><td>diagnostics scripts</td><td>test objects only</td><td>operator runbook</td><td>available</td></tr></tbody></table></div></section><section class="panel wide" id="admin-objects"><h3>Protected object inventory</h3><p>Object metadata is loaded through the read-only backend wrapper after Auth administrator validation. Object bodies, credentials, and presigned private URLs are never returned.</p><div class="table-wrap"><table><thead><tr><th>Key</th><th>Size</th><th>Type</th><th>Modified</th></tr></thead><tbody data-admin-objects-table><tr><td colspan="4">Sign in as an administrator to load inventory metadata.</td></tr></tbody></table></div></section><section class="panel" id="admin-settings"><h3>Settings</h3><div class="status-row"><span>Endpoint</span><b>minio.alfares.cz</b></div><div class="status-row"><span>CORS origins</span><b>configured in k8s</b></div><div class="status-row"><span>Wrapper mode</span><b>read-only metadata</b></div></section><section class="panel" id="admin-audit"><h3>Audit events</h3><ol class="audit-list"><li>Admin token validation requested.</li><li>Health checks refreshed from browser-safe endpoints.</li><li>Read-only metadata requested through the protected backend wrapper.</li></ol></section></div></div></section></main><script src="/app.js?v=20260613-auth-body-validate" defer></script></body></html>
  styles.css: |-
    :root{--bg:#f6f8fb;--surface:#fff;--ink:#101828;--muted:#667085;--line:#d9e0ea;--blue:#165dff;--green:#08875d;--amber:#b54708;--shadow:0 18px 42px rgba(16,24,40,.08);--r:8px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);letter-spacing:0}a{color:inherit;text-decoration:none}button,input,textarea,select{font:inherit}.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:28px;min-height:68px;padding:0 36px;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.brand{display:flex;align-items:center;gap:12px;font-weight:760}.brand-mark{display:grid;place-items:center;width:34px;height:34px;border-radius:8px;background:#101828;color:#fff}.nav{display:flex;gap:22px;margin-left:auto;color:#344054;font-size:14px;font-weight:650}.nav a:hover{color:var(--blue)}.menu-button{display:none}.icon-button{border:1px solid var(--line);background:#fff;border-radius:8px;width:40px;height:40px}.section-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(420px,560px);gap:48px;align-items:center}.hero{min-height:calc(100vh - 68px);padding:72px 6vw 48px;background:linear-gradient(180deg,#fff 0%,#f6f8fb 100%)}.hero h1{font-size:clamp(42px,6vw,78px);line-height:.98;margin:0 0 24px;font-weight:820;max-width:850px}.hero p,.section-title p,.split p,.panel p{color:var(--muted);line-height:1.65}.hero-copy>p{font-size:19px;max-width:700px}.hero-actions,.form-actions,.head-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.button{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 16px;border-radius:8px;border:1px solid var(--line);font-weight:720;font-size:14px;cursor:pointer}.button.primary{background:var(--blue);border-color:var(--blue);color:#fff}.button.secondary{background:#fff;color:#182230}.proof-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin:42px 0 0;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff;max-width:720px}.proof-strip div{padding:18px;border-right:1px solid var(--line)}.proof-strip div:last-child{border-right:0}.proof-strip dt{font-size:12px;color:var(--muted);font-weight:700}.proof-strip dd{margin:5px 0 0;font-weight:780}.product-preview,.panel,.price-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}.product-preview{padding:18px}.preview-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:14px}.preview-head strong,.status-row b{color:var(--green)}.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:18px 0}.metric-grid div{border:1px solid var(--line);border-radius:8px;padding:16px;background:#fbfcfe}.metric-grid span{display:block;color:var(--muted);font-size:12px;font-weight:700}.metric-grid strong{font-size:26px}.flow-list{display:grid;gap:10px}.flow-list div{display:grid;gap:3px;padding:13px;border-left:3px solid var(--blue);background:#f7f9ff}.flow-list span{color:var(--muted);font-size:13px}.section{padding:74px 6vw}.band{background:#fff}.section-title{display:flex;justify-content:space-between;gap:36px;align-items:end;margin-bottom:28px}.section-title h2,.split h2,.workspace-head h2{font-size:36px;line-height:1.08;margin:0}.section-title p{max-width:520px}.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.price-card{padding:24px;display:grid;gap:14px}.price-card h3{font-size:24px;margin:0}.price-card strong{font-size:28px}.price-card ul{margin:0;padding-left:18px;color:#344054;line-height:1.9}.featured{border-color:#9bb8ff;box-shadow:0 22px 50px rgba(22,93,255,.14)}.split{display:grid;grid-template-columns:minmax(0,480px) minmax(420px,1fr);gap:48px;align-items:start}.form-panel{padding:22px}.form-panel label,.compact-form{display:grid;gap:8px;font-weight:700;color:#344054}.form-panel input,.form-panel textarea,.compact-form input,.compact-form select{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff;color:var(--ink)}.form-panel{display:grid;gap:14px}.check{grid-template-columns:auto 1fr!important;align-items:start;font-weight:600!important}.form-status{min-height:22px;margin:0;color:var(--muted)}.app-shell{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:860px;border-top:1px solid var(--line);background:#f4f7fb}.admin-shell{background:#f7f8fa}.sidebar{position:sticky;top:68px;align-self:start;height:calc(100vh - 68px);padding:24px;border-right:1px solid var(--line);background:#fff;display:flex;flex-direction:column;gap:8px}.sidebar b{margin-bottom:16px}.sidebar a{padding:11px 12px;border-radius:8px;color:#475467;font-weight:700;font-size:14px}.sidebar a.active,.sidebar a:hover{background:#eef4ff;color:var(--blue)}.workspace{padding:28px;min-width:0}.workspace-head{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:20px}.workspace-head p{margin:8px 0 0;color:var(--muted)}.dashboard-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.panel{padding:20px;min-width:0}.panel h3{margin:0 0 16px;font-size:18px}.wide{grid-column:span 2}.status-row{display:flex;justify-content:space-between;gap:18px;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px}.status-row:last-child{border-bottom:0}.big-number{font-size:42px;font-weight:820}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}table{width:100%;border-collapse:collapse;min-width:620px;background:#fff}th,td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px}th{color:#475467;background:#f8fafc;font-size:12px;text-transform:uppercase}code{display:block;padding:11px 12px;margin:8px 0;border:1px solid var(--line);border-radius:8px;background:#0f172a;color:#d8e2ff;overflow:auto}.compact-form{gap:10px}.admin-lock{padding:18px;margin-bottom:18px;border:1px solid #fedf89;background:#fffaeb;color:#93370d;border-radius:8px;font-weight:700}.object-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.object-grid span{padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbfcfe}.audit-list{color:#475467;line-height:1.9;padding-left:20px}@media(max-width:980px){.topbar{padding:0 18px}.nav{display:none;position:absolute;left:18px;right:18px;top:62px;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px}.nav.open{display:flex}.menu-button{display:inline-grid;margin-left:auto}.section-grid,.split{grid-template-columns:1fr}.hero{padding:52px 22px}.product-preview{max-width:100%}.pricing-grid,.dashboard-grid{grid-template-columns:1fr}.wide{grid-column:auto}.section{padding:52px 22px}.section-title{display:block}.app-shell{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line);flex-direction:row;overflow:auto}.workspace{padding:20px}.workspace-head{align-items:flex-start;flex-direction:column}.proof-strip{grid-template-columns:1fr}.proof-strip div{border-right:0;border-bottom:1px solid var(--line)}.proof-strip div:last-child{border-bottom:0}.object-grid{grid-template-columns:1fr}}@media(max-width:560px){.hero h1{font-size:40px}.section-title h2,.split h2,.workspace-head h2{font-size:28px}.metric-grid{grid-template-columns:1fr}.hero-actions,.form-actions,.head-actions{width:100%}.button{width:100%}.sidebar a{white-space:nowrap}}
  app.js: |-
    const CONFIG = {
      leadsUrl: "https://leads.alfares.cz/api/leads/submit",
      authBase: "https://auth.alfares.cz",
      clientId: "minio-microservice",
      s3Endpoint: "https://minio.alfares.cz",
      adminApiBase: `${window.location.origin}/api/admin`,
      adminRoles: ["global:superadmin", "app:minio-microservice:admin", "internal:minio-microservice:admin"]
    };
    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
    function randomState(){const bytes=new Uint8Array(16);crypto.getRandomValues(bytes);return Array.from(bytes,b=>b.toString(16).padStart(2,"0")).join("")}
    function authUrl(mode,targetPath){const state=randomState();sessionStorage.setItem("minio_auth_state",state);const path=targetPath || (document.body.dataset.page === "admin" ? "/admin/" : "/client/");const returnUrl=`${window.location.origin}${path}`;return `${CONFIG.authBase}/${mode}?return_url=${encodeURIComponent(returnUrl)}&client_id=${encodeURIComponent(CONFIG.clientId)}&state=${encodeURIComponent(state)}`}
    function saveTokensFromHash(){if(!window.location.hash.includes("access_token"))return;const params=new URLSearchParams(window.location.hash.slice(1));const expected=sessionStorage.getItem("minio_auth_state");const returned=params.get("state");if(expected&&returned&&expected!==returned){sessionStorage.removeItem("minio_auth_state");return}const token=params.get("access_token");if(token)sessionStorage.setItem("minio_access_token",token);const refresh=params.get("refresh_token");if(refresh)sessionStorage.setItem("minio_refresh_token",refresh);history.replaceState(null,"",window.location.pathname)}
    async function validateAuth(){const token=sessionStorage.getItem("minio_access_token")||localStorage.getItem("minio_access_token");if(!token)return null;try{const res=await fetch(`${CONFIG.authBase}/auth/validate`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token})});if(!res.ok)throw new Error(`Auth validation failed: ${res.status}`);return await res.json()}catch(error){console.warn(error);return null}}
    function normalizeRoles(authUser){return authUser?.roles||authUser?.user?.roles||authUser?.data?.roles||[]}
    function userLabel(authUser){return authUser?.email||authUser?.user?.email||authUser?.data?.email||"authenticated user"}
    function escapeHtml(value){return String(value).replace(/[&<>'"]/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[char]))}
    function renderApplications(){const table=$("[data-app-table]");if(!table)return;const apps=JSON.parse(localStorage.getItem("minio_customer_apps")||"[]");const rows=apps.length?apps:[{appName:"No applications yet",environment:"-",origin:"Submit the form to prepare onboarding",status:"draft"}];table.innerHTML=rows.map(app=>`<tr><td>${escapeHtml(app.appName)}</td><td>${escapeHtml(app.environment)}</td><td>${escapeHtml(app.origin)}</td><td>${escapeHtml(app.status||"draft")}</td></tr>`).join("")}
    async function submitLead(event){event.preventDefault();const form=event.currentTarget;const status=$("[data-lead-status]");const data=new FormData(form);const marketingConsent=data.get("marketingConsent")==="on";const payload={sourceService:"minio-microservice",sourceUrl:window.location.href,sourceLabel:"request-access",message:data.get("message"),contactMethods:[{type:"email",value:data.get("email")}],preferredChannel:"email",metadata:{name:data.get("name"),company:data.get("company"),intent:"request_access",surface:"minio_landing",productKey:"minio"},marketingConsent};if(marketingConsent){payload.consentSource="minio-landing-request-access-checkbox";payload.consentCapturedAt=new Date().toISOString()}status.textContent="Submitting lead request...";try{const res=await fetch(CONFIG.leadsUrl,{method:"POST",headers:{"Content-Type":"application/json","X-Service-Name":"minio-microservice-landing"},body:JSON.stringify(payload)});if(!res.ok)throw new Error(`Lead submission failed: ${res.status}`);const response=await res.json();localStorage.setItem("minio_last_lead",JSON.stringify(response));const leadState=$("[data-lead-state]");if(leadState)leadState.textContent=`Submitted: ${response.status||"new"}`;status.textContent="Lead submitted. Continue with Auth registration when ready."}catch(error){status.textContent="Lead submission could not be completed. Try again or contact the operator.";console.warn(error)}}
    function addApplication(event){event.preventDefault();const data=new FormData(event.currentTarget);const apps=JSON.parse(localStorage.getItem("minio_customer_apps")||"[]");apps.push({appName:data.get("appName"),environment:data.get("environment"),origin:data.get("origin"),status:"awaiting approval"});localStorage.setItem("minio_customer_apps",JSON.stringify(apps));event.currentTarget.reset();renderApplications()}
    async function refreshAdminHealth(){const live=$("[data-health-live]");const ready=$("[data-health-ready]");if(!live||!ready)return;live.textContent="Checking";ready.textContent="Checking";await Promise.all([probe(`${CONFIG.s3Endpoint}/minio/health/live`).then(ok=>live.textContent=ok?"Reachable":"Blocked by browser/CORS"),probe(`${CONFIG.s3Endpoint}/minio/health/ready`).then(ok=>ready.textContent=ok?"Reachable":"Blocked by browser/CORS")])}
    async function probe(url){try{await fetch(url,{method:"GET",mode:"no-cors",cache:"no-store"});return true}catch(_){return false}}
    async function adminApi(path){const token=sessionStorage.getItem("minio_access_token")||localStorage.getItem("minio_access_token");if(!token)throw new Error("Missing admin token");const res=await fetch(`${CONFIG.adminApiBase}${path}`,{headers:{Authorization:`Bearer ${token}`},cache:"no-store"});if(!res.ok)throw new Error(`Admin API failed: ${res.status}`);return res.json()}
    function formatBytes(value){const units=["B","KB","MB","GB","TB"];let size=Number(value)||0;let unit=0;while(size>=1024&&unit<units.length-1){size/=1024;unit++}return `${size.toFixed(unit?1:0)} ${units[unit]}`}
    function renderAdminObjects(objects){const table=$("[data-admin-objects-table]");if(!table)return;table.innerHTML=objects.length?objects.map(item=>`<tr><td>${escapeHtml(item.key)}</td><td>${formatBytes(item.size)}</td><td>${escapeHtml(item.contentType)}</td><td>${escapeHtml(item.lastModified)}</td></tr>`).join(""):`<tr><td colspan="4">No objects returned for the current prefix.</td></tr>`}
    async function refreshAdminMetadata(){const status=$("[data-admin-api-status]");if(status)status.textContent="Loading protected metadata";try{const [summary,listing]=await Promise.all([adminApi("/summary"),adminApi("/objects?limit=25")]);const bucket=$("[data-admin-bucket]");if(bucket)bucket.textContent=summary.bucket;const count=$("[data-admin-object-count]");if(count)count.textContent=String(summary.objectCount);const bytes=$("[data-admin-total-bytes]");if(bytes)bytes.textContent=formatBytes(summary.totalBytes);const newest=$("[data-admin-newest]");if(newest) newest.textContent=summary.newestObjectModifiedAt||"No objects";renderAdminObjects(listing.objects||[]);if(status)status.textContent=summary.truncated?"Loaded partial protected metadata":"Loaded protected metadata"}catch(error){if(status)status.textContent="Protected metadata unavailable";console.warn(error)}}
    async function bootAuthState(){saveTokensFromHash();const authUser=await validateAuth();if(authUser){const authState=$("[data-auth-state]");if(authState)authState.textContent="Signed in";const identity=$("[data-client-identity]");if(identity)identity.textContent=`Signed in as ${userLabel(authUser)}.`}const roles=normalizeRoles(authUser);const isAdmin=roles.some(role=>CONFIG.adminRoles.includes(role));if(isAdmin){const lock=$("[data-admin-lock]");const data=$("[data-admin-data]");if(lock&&data){lock.hidden=true;data.hidden=false;$("[data-admin-identity]").textContent=`Administrator session validated for ${userLabel(authUser)}.`;refreshAdminHealth();refreshAdminMetadata()}}}
    function bind(){const menu=$("[data-menu-toggle]");if(menu)menu.addEventListener("click",()=>$(".nav").classList.toggle("open"));$$('[data-auth-register]').forEach(button=>button.addEventListener("click",()=>window.location.href=authUrl("register",button.dataset.authTarget)));$$('[data-auth-login]').forEach(button=>button.addEventListener("click",()=>window.location.href=authUrl("login",button.dataset.authTarget)));$("[data-lead-form]")?.addEventListener("submit",submitLead);$("[data-app-form]")?.addEventListener("submit",addApplication);$("[data-admin-refresh]")?.addEventListener("click",()=>{refreshAdminHealth();refreshAdminMetadata()})}
    bind();renderApplications();bootAuthState();
  default.conf: |-
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
    
      location = /admin { rewrite ^ /admin/ last; }
      location /admin/ { index index.html; try_files $uri $uri/ /admin/index.html; }
      location = /client { rewrite ^ /client/ last; }
      location /client/ { index index.html; try_files $uri $uri/ /client/index.html; }
      location / { try_files $uri $uri/ /index.html; }
    }
