apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-microservice-secret
  namespace: statex-apps
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: minio-microservice-secret
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: secret/prod/minio-microservice
        property: MINIO_ROOT_PASSWORD
    - secretKey: PAYMENT_API_KEY
      remoteRef:
        key: secret/prod/minio-microservice
        property: PAYMENT_API_KEY
    - secretKey: PAYMENT_APPLICATION_ID
      remoteRef:
        key: secret/prod/minio-microservice
        property: PAYMENT_APPLICATION_ID
    - secretKey: PAYMENT_WEBHOOK_API_KEY
      remoteRef:
        key: secret/prod/minio-microservice
        property: PAYMENT_WEBHOOK_API_KEY
