apiVersion: v1
kind: Service
metadata:
  name: minio-admin-api
  namespace: statex-apps
  labels:
    app: minio-admin-api
    managed-by: k8s-migration
spec:
  type: ClusterIP
  selector:
    app: minio-admin-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: http
