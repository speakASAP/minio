apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-microservice
  namespace: statex-apps
  labels:
    app: minio-microservice
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio-microservice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: minio-microservice
    spec:
      containers:
        - name: app
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z
          imagePullPolicy: IfNotPresent
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: http
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-microservice-secret
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_API_CORS_ALLOW_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: minio-microservice-config
                  key: RECORDS_CORS_ORIGINS
          startupProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /srv/speakasap-records
            type: DirectoryOrCreate
