apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-microservice
  namespace: statex-apps
  labels:
    app: minio-microservice
    managed-by: k8s-migration
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - minio.alfares.cz
      secretName: minio-microservice-tls
  rules:
    - host: minio.alfares.cz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-microservice
                port:
                  number: 9000
