apiVersion: batch/v1
kind: Job
metadata:
  name: minio-microservice-cors
  namespace: statex-apps
  labels:
    app: minio-microservice
    managed-by: k8s-migration
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: minio-microservice
    spec:
      restartPolicy: Never
      containers:
        - name: set-cors
          image: minio/mc:latest
          command:
            - /bin/sh
            - -ec
            - |
              NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              RECORDS_BUCKET="${RECORDS_BUCKET:-speakasap-records}"
              echo "${NOW} [INFO] applying CORS for bucket ${RECORDS_BUCKET}"
              mc alias set minio "${MINIO_ENDPOINT}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
              TMP_XML="$(mktemp /tmp/minio-cors-XXXXXX.xml)"
              trap 'rm -f "${TMP_XML}"' EXIT
              printf '%s\n' "${RECORDS_CORS_ORIGINS}" | tr ',' '\n' | awk 'NF{gsub(/^[ \t]+|[ \t]+$/, "", $0); print "    <AllowedOrigin>"$0"</AllowedOrigin>"}' > /tmp/origins.xml
              cat > "${TMP_XML}" <<'EOF'
              <?xml version="1.0" encoding="UTF-8"?>
              <CORSConfiguration xmlns="http://s3.amazonaws.com/doc/2006-03-01/">
                <CORSRule>
              EOF
              cat /tmp/origins.xml >> "${TMP_XML}"
              cat >> "${TMP_XML}" <<'EOF'
                  <AllowedMethod>GET</AllowedMethod>
                  <AllowedMethod>PUT</AllowedMethod>
                  <AllowedMethod>HEAD</AllowedMethod>
                  <AllowedMethod>OPTIONS</AllowedMethod>
                  <AllowedHeader>*</AllowedHeader>
                  <ExposeHeader>ETag</ExposeHeader>
                  <ExposeHeader>Content-Length</ExposeHeader>
                  <ExposeHeader>Content-Type</ExposeHeader>
                  <ExposeHeader>x-amz-request-id</ExposeHeader>
                  <MaxAgeSeconds>3600</MaxAgeSeconds>
                </CORSRule>
              </CORSConfiguration>
              EOF
              mc cors set "minio/${RECORDS_BUCKET}" "${TMP_XML}"
              echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) [INFO] CORS apply done"
          env:
            - name: MINIO_ENDPOINT
              value: http://minio-microservice.statex-apps.svc.cluster.local:9000
            - name: RECORDS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: minio-microservice-config
                  key: RECORDS_BUCKET
                  optional: true
            - name: RECORDS_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: minio-microservice-config
                  key: RECORDS_CORS_ORIGINS
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-microservice-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-microservice-secrets
                  key: MINIO_ROOT_PASSWORD
